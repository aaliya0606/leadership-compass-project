<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Register | Leadership Compass </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style/main.css" />
</head>

<body class="auth-body">

  <div class="auth-card">
    <h2 class="text-center mb-2">Create Account</h2>
    <p class="text-center text-muted mb-4"> Register for Leadership Compass </p>

    <form class="form-control" id="registerForm">
      <div class="mb-3">
        <label class="form-label"> Full Name </label>
        <input type="text" id="registerFullName" class="form-control"
            placeholder="Enter Full name" required>
      </div>

      <div class="mb-3">
        <label class="form-label"> Email </label>
        <input type="email" id="registerEmail" class="form-control"
            placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label class="form-label"> Password </label>
        <input type="password" id="registerPassword" class="form-control"
            placeholder="Enter password" required>
      </div>

      <div class="mb-3">
        <label class="form-label"> Confirm Password </label>
        <input type="password" id="confirmPassword" class="form-control"
            placeholder="Confirm password" required>
      </div>

      <div class="mb-3">
        <label class="form-label"> Role </label>
        <select id="registerRole" class="form-select">
          <option value="USER"> User </option>
          <option value="ADMIN"> Admin </option>
        </select>
      </div>

      <button type="submit" class="btn btn-success w-100"> Register </button>
    </form>

    <p id="registerMessage" class="mt-3 text-center"></p>

    <p class="text-center mt-3">
      Already have an account?
      <a href="index.html"> Login </a>
    </p>
  </div>

  <script src="static/js/auth.js"></script>
</body>

</html>
