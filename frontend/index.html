<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> Login | Leadership Compass </title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/style/main.css" />
</head>

<body class="auth-body">

  <div class="auth-card">
    <h2 class="text-center mb-2"> Leadership Compass </h2>
    <p class="text-center text-muted mb-4"> Login to your account </p>

    <form class="form-control" id="loginForm">
      <div class="mb-3">
        <label class="form-label"> Email </label>
        <input type="email" id="loginEmail" class="form-control" 
            placeholder="Enter email" required>
      </div>

      <div class="mb-3">
        <label class="form-label"> Password </label>
        <input type="password" id="loginPassword" class="form-control"
            placeholder="Enter password" required>
      </div>

      <button type="submit" class="btn btn-primary w-100"> Login </button>
    </form>

    <p id="loginMessage" class="mt-3 text-center"></p>

    <p class="text-center mt-3">
      Don't have an account?
      <a href="register.html"> Register </a>
    </p>
  </div>

  <script src="static/js/auth.js"></script>
</body>

</html>
