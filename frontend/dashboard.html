<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Leadership Compass</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/style/main.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-primary px-4">
      <span class="navbar-brand"> Leadership Compass Dashboard </span>
      <button id="logoutBtn" class="btn btn-light">Logout</button>
    </nav>

    <main class="container mt-5">

      <div class="dashboard-card">
        <h1> Welcome to your Dashboard </h1>
        <p> You are successfully authenticated. </p>

        <hr />

        <h4> JWT Token Status </h4>
        <p id="tokenStatus"></p>

        <h4> User Role </h4>
        <p id="userRole">Role will appear here later.</p>

        <h4> Backend Protected API Response </h4>
        <p id="backendResponse">Waiting for backend response...</p>

        <h4> Please click the Survey button to start the survey. </h4>
        <button id="surveyBtn" type="button" class="btn btn-primary" style="width: 200px;"> Start the Survery </button>
      </div>

    </main>

    <script src="static/js/dashboard.js"></script>
  </body>
</html>
